[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "reachy-mini-live-chat"
version = "0.2.0"
description = "Realtime full-duplex audio-visual dialogue for Reachy Mini: streams mic+camera to a remote MiniCPM-o 4.5 omni model (llama.cpp-omni) over WebSocket, with DOA head-tracking and safety-clamped expressive motion."
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = { text = "Apache-2.0" }
authors = [{ name = "Reachy Mini Live Chat" }]
keywords = ["reachy_mini", "robotics", "voice-assistant", "full-duplex", "omni", "minicpm-o", "websocket"]

# The brain is remote (over WebSocket), so the always-needed deps are tiny: numpy for
# audio/PCM, websockets for the omni link, dotenv for config. Everything else (robot SDK,
# VAD, camera, web UI, AEC) is an optional extra and lazy-imported.
dependencies = [
    "numpy>=1.24",
    "scipy>=1.10",
    "python-dotenv>=1.0",
    "websockets>=12",
]

[project.optional-dependencies]
# The robot SDK — installed on the machine wired to the robot (or on the CM4 image) / for --sim.
robot = ["reachy-mini"]

# Local VAD (drives DOA / listen mood / barge-in) + sim audio I/O on a laptop.
audio = ["silero-vad", "sounddevice", "soundfile"]
# Camera frame downscale + JPEG encode (on-robot frames come from the SDK; PIL/cv2 encode them).
vision = ["opencv-python", "pillow"]
# Web control/monitor UI (transcript, video preview, state) — used by the standalone dev runner.
web = ["fastapi", "uvicorn"]
# Optional true acoustic echo cancellation (else a duck-and-gate fallback is used).
aec = ["webrtc-audio-processing"]

# On-robot (Wireless CM4, ARM64 Linux). Minimal: no local ML — the omni server does it all.
# `reachy-mini` is normally already present in the robot image.
cm4 = [
    "reachy-mini",
    "silero-vad",
    "opencv-python-headless",
    "pillow",
    "fastapi", "uvicorn",
]

# Everything for a full run on a dev laptop bridging to the robot.
laptop = [
    "reachy-mini",
    "silero-vad", "sounddevice", "soundfile",
    "opencv-python", "pillow",
    "fastapi", "uvicorn",
]

dev = ["pytest>=7", "ruff", "numpy>=1.24", "pillow"]

[project.entry-points."reachy_mini_apps"]
# The Reachy Mini daemon discovers the app through this entry point.
live_chat = "reachy_mini_live_chat.main:LiveChatApp"

[project.scripts]
reachy-mini-live-chat = "reachy_mini_live_chat.main:cli"

[tool.setuptools.packages.find]
include = ["reachy_mini_live_chat*"]

[tool.setuptools.package-data]
reachy_mini_live_chat = ["static/*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py311"
