<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Reachy Mini · Live Chat</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>🤖 Reachy Mini · Live Chat</h1>
    <div class="pills">
      <span id="state" class="pill state-idle">idle</span>
      <span id="latency" class="pill">— ms</span>
      <span id="emotion" class="pill hidden"></span>
    </div>
  </header>

  <main>
    <section class="video">
      <img id="cam" alt="camera" />
      <div id="camoff" class="camoff">no camera</div>
    </section>

    <section class="chat">
      <div id="log" class="log"></div>
      <form id="composer" autocomplete="off">
        <input id="msg" type="text" placeholder="说点什么… / Say something…" />
        <button type="submit">Send</button>
      </form>
      <p class="hint">Speak to the robot, or type here. Barge in anytime — it stops and listens.</p>
    </section>
  </main>

  <script src="/static/main.js"></script>
</body>
</html>
